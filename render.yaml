databases:
  - name: algolens-db
    databaseName: algolens
    user: algolens_user
    plan: free

services:
  - type: web
    name: algolens-server
    plan: free
    rootDir: server
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: algolens-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        value: https://algolens-client.onrender.com

  - type: static
    name: algolens-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://algolens-server.onrender.com
