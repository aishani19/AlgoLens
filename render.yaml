databases:
  - name: algolens-db
    databaseName: algolens
    user: algolens_user
    plan: free

services:
  - type: web
    name: algolens-server
    plan: free
    rootDir: server
    runtime: node
    buildCommand: cd ../client && npm install && npm run build && cd ../server && npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: algolens-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
